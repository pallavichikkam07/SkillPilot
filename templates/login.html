<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0">

<title>SkillPilot Login</title>

<link rel="stylesheet"
href="{{ url_for('static',
filename='css/skillpilotstyle.css') }}">

</head>

<body>

<div class="interview-container">

    <div class="interview-card">

        <h1 class="interview-title">

            🔐 Login

        </h1>

        {% if error %}

        <p style="color:red;
        text-align:center;
        margin-bottom:20px;">

            {{ error }}

        </p>

        {% endif %}

        <form action="/login"
        method="POST">

            <!-- EMAIL -->

            <input

            type="email"

            name="email"

            placeholder="Enter Email"

            required

            class="answer-input">

            <!-- PASSWORD -->

            <input

            type="password"

            name="password"

            placeholder="Enter Password"

            required

            class="answer-input">

            <button

            type="submit"

            class="next-btn">

                Login

            </button>

                 <a href="/signup">

                                  <button

                                                   type="button"

                                                   class="next-btn"

                                                   style="margin-top:15px;">

                                                   Create Account

                                  </button>

                 </a>

        </form>

    </div>

</div>

</body>

</html>
